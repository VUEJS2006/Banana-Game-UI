<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Game Shop</title>

    <script src="./static/js/tailwind.min.js"></script>

    <link rel="stylesheet" href="./static/css/tabler.min.css">
    <link rel="stylesheet" href="./static/css/swiper.min.css" />
    <link rel="stylesheet" href="./static/css/style.css">
    <script src="./static/js/swiper.min.js"></script>
    <script src="./static/js/script.js"></script>

</head>




<body class="bg-darkBg text-white">

    <header class="bg-black/40 backdrop-blur-lg border-b border-gray-800 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-xl font-bold bg-gradient-to-r from-neoYellow to-neoPurple bg-clip-text text-transparent">
                GameShop
            </h1>


            <nav class="hidden md:flex gap-6 text-sm">
                <a href="#" class="hover:text-neoYellow">Home</a>
                <a href="#" class="hover:text-neoYellow">Topup</a>
                <a href="#" class="hover:text-neoYellow">Contact</a>
            </nav>


            <div class="flex items-center gap-3">

                <button onclick="toggleSearch()" class="p-2 rounded-full bg-white/10 backdrop-blur-md">
                    <i class="ti ti-search text-white text-xl"></i>
                </button>


                <button onclick="toggleMenu()" class="md:hidden p-2 rounded-full bg-white/10">
                    <i class="ti ti-menu-2 text-white text-xl"></i>
                </button>
            </div>
        </div>


        <div id="mobileMenu" class="hidden md:hidden px-4 pb-4">
            <a href="#" class="block py-2 border-b border-gray-700">Home</a>
            <a href="#" class="block py-2 border-b border-gray-700">Topup</a>
            <a href="#" class="block py-2">Contact</a>
        </div>
    </header>

    <section class="bg-[#0b0120] pt-32 pb-16 overflow-hidden">

        <!-- pt-32 = navbar space fix -->

        <div class="swiper mySwiper px-4">

            <div class="swiper-wrapper">

                <!-- SLIDE -->
                <div class="swiper-slide !flex justify-center">
                    <div class="relative w-[900px] h-[360px] 
                    max-md:w-[92%] max-md:h-[220px]
                    rounded-2xl overflow-hidden
                    shadow-[0_20px_50px_rgba(0,0,0,0.45)]
                    transition-all duration-300">

                        <img src="./image/slider.jpg" class="w-full h-full object-cover" />

                        <!-- overlay -->
                        <div class="absolute inset-0 
                      bg-gradient-to-r 
                      from-black/80 via-black/30 to-transparent"></div>

                        <!-- text -->
                        <div class="absolute bottom-6 left-6 text-white z-10">
                            <h2 class="text-3xl md:text-4xl font-bold">
                                PUBG MOBILE X BLUE LOCK
                            </h2>
                            <p class="mt-2 text-sm text-gray-300">
                                Prize Path & Lucky Spin
                            </p>
                        </div>

                    </div>
                </div>

                <!-- SLIDE -->
                <div class="swiper-slide !flex justify-center">
                    <div class="relative w-[900px] h-[360px] 
                    max-md:w-[92%] max-md:h-[220px]
                    rounded-2xl overflow-hidden
                    shadow-[0_20px_50px_rgba(0,0,0,0.45)]
                    transition-all duration-300">

                        <img src="./image/slider-2.png" class="w-full h-full object-cover" />

                        <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/30 to-transparent"></div>

                        <div class="absolute bottom-6 left-6 text-white z-10">
                            <h2 class="text-3xl md:text-4xl font-bold">
                                Mobile Legends
                            </h2>
                            <p class="mt-2 text-sm text-gray-300">
                                Fast & Cheap Diamonds
                            </p>
                        </div>

                    </div>
                </div>

                <!-- SLIDE -->
                <div class="swiper-slide !flex justify-center">
                    <div class="relative w-[900px] h-[360px] 
                    max-md:w-[92%] max-md:h-[220px]
                    rounded-2xl overflow-hidden
                    shadow-[0_20px_50px_rgba(0,0,0,0.45)]
                    transition-all duration-300">

                        <img src="./image/slider-3.jpg" class="w-full h-full object-cover" />

                        <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/30 to-transparent"></div>

                        <div class="absolute bottom-6 left-6 text-white z-10">
                            <h2 class="text-3xl md:text-4xl font-bold">
                                Genshin Impact
                            </h2>
                            <p class="mt-2 text-sm text-gray-300">
                                Genesis Crystal
                            </p>
                        </div>

                    </div>
                </div>

            </div>

            <!-- dots -->
            <div class="swiper-pagination mt-6"></div>

        </div>

    </section>
    <div id="searchBox" class="hidden fixed top-16 left-0 w-full px-4 z-40">
        <div class="max-w-7xl mx-auto bg-[#151528] border border-gray-800 rounded-xl p-3 flex items-center shadow-lg">
            <i class="ri-search-line text-gray-400 mr-2"></i>
            <input type="text" placeholder="Search game..."
                class="w-full bg-transparent outline-none text-sm placeholder-gray-400" />
        </div>
    </div>


    <section class="max-w-7xl mx-auto px-4 pb-12">
        <div class="grid grid-cols-2 md:grid-cols-6 gap-6">

            <div class="rounded-2xl overflow-hidden border border-gray-800 bg-[#151528] hover:scale-105 transition">
                <div class="h-72 relative">
                    <!-- HEIGHT ↑ -->
                    <img src="./image/mlbb.png" class="w-full h-full object-cover" />

                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                </div>

                <div class="p-4">
                    <h3
                        class="text-center font-semibold text-sm bg-gradient-to-r from-neoYellow to-neoPurple bg-clip-text text-transparent">
                        Mobile Legends
                    </h3>
                </div>
            </div>


            <div class="rounded-2xl overflow-hidden border border-gray-800 bg-[#151528] hover:scale-105 transition">
                <div class="h-72 relative">
                    <img src="./image/pubg.jpg" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                </div>

                <div class="p-4">
                    <h3
                        class="text-center font-semibold text-sm bg-gradient-to-r from-neoPurple to-neoYellow bg-clip-text text-transparent">
                        PUBG Mobile
                    </h3>
                </div>
            </div>


            <div class="rounded-2xl overflow-hidden border border-gray-800 bg-[#151528] hover:scale-105 transition">
                <div class="h-72 relative">
                    <img src="./image/mv.avif" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                </div>

                <div class="p-4">
                    <h3
                        class="text-center font-semibold text-sm bg-gradient-to-r from-neoYellow to-neoPurple bg-clip-text text-transparent">
                        Free Fire
                    </h3>
                </div>
            </div>


            <div class="rounded-2xl overflow-hidden border border-gray-800 bg-[#151528] hover:scale-105 transition">
                <div class="h-72 relative">
                    <img src="./image/guneshin.jpg" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                </div>

                <div class="p-4">
                    <h3
                        class="text-center font-semibold text-sm bg-gradient-to-r from-neoPurple to-neoYellow bg-clip-text text-transparent">
                        Genshin Impact
                    </h3>
                </div>
            </div>
            <div class="rounded-2xl overflow-hidden border border-gray-800 bg-[#151528] hover:scale-105 transition">
                <div class="h-72 relative">
                    <img src="./image/kung.jpg" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                </div>

                <div class="p-4">
                    <h3
                        class="text-center font-semibold text-sm bg-gradient-to-r from-neoPurple to-neoYellow bg-clip-text text-transparent">
                        Kung Fu Panda
                    </h3>
                </div>
            </div>
            <div class="rounded-2xl overflow-hidden border border-gray-800 bg-[#151528] hover:scale-105 transition">
                <div class="h-72 relative">
                    <img src="./image/where.avif" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                </div>

                <div class="p-4">
                    <h3
                        class="text-center font-semibold text-sm bg-gradient-to-r from-neoPurple to-neoYellow bg-clip-text text-transparent">
                        wuthering waves
                    </h3>
                </div>
            </div>
        </div>
    </section>


    <footer class="border-t border-gray-800 py-6 text-center text-gray-400 text-sm">
        © 2026 GameShop
    </footer>
    <script>
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            centeredSlides: true,
            slidesPerView: "auto",
            spaceBetween: 20,

            autoplay: {
                delay: 3000,
            },

            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },
        });
    </script>
</body>

</html>

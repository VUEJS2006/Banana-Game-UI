<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Game Shop</title>


    <script src="js/tailwind.min.js"></script>
    <link rel="stylesheet" href="css/tabler.min.css" type="text/css" />
    <link rel="stylesheet" href="css/swiper.min.css" type="text/css" />

</head>

<body class="bg-darkBg text-white">
    <header class="bg-black/40 backdrop-blur-lg border-b border-gray-800 fixed top-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <!-- LOGO -->
            <h1 class="text-xl font-bold bg-gradient-to-r from-yellow-300 to-purple-500 bg-clip-text text-transparent">
                GameShop
            </h1>

            <!-- DESKTOP MENU -->
            <nav class="hidden md:flex gap-6 text-sm text-white">
                <a href="index.html" class="hover:text-yellow-300 transition">
                    Home
                </a>

                <a href="topup.html" class="hover:text-yellow-300 transition">
                    Top Up
                </a>
            </nav>


            <div class="flex items-center gap-3">

                <button onclick="toggleSearch()" class="p-2 rounded-full bg-white/10 backdrop-blur-md">
                    <i class="ti ti-search text-white text-xl"></i>
                </button>


                <button onclick="toggleMenu()" class="md:hidden p-2 rounded-full bg-white/10">
                    <i class="ti ti-menu-2 text-white text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/60 z-40 hidden"></div>


    <div id="mobileMenu"
        class="fixed top-0 right-[-100%] w-[280px] h-full bg-[#14052d] z-50 transition-all duration-300 shadow-2xl">

        <div class="flex items-center justify-between p-5 border-b border-purple-500/20">
            <h2 class="text-xl font-bold text-white">Menu</h2>

            <button onclick="toggleMenu()">
                <i class="ti ti-x text-white text-3xl"></i>
            </button>
        </div>


        <div class="p-5 flex flex-col gap-4 text-white">
            <a href="index.html" class="bg-white/5 hover:bg-purple-600 px-4 py-4 rounded-2xl transition">
                Home
            </a>

            <a href="topup.html" class="bg-white/5 hover:bg-purple-600 px-4 py-4 rounded-2xl transition">
                Top Up
            </a>
        </div>


        <div class="absolute bottom-6 left-0 w-full px-5">
            <div class="grid grid-cols-2 gap-3">
                <a href="#" class="bg-white/10 text-white py-3 rounded-xl text-center">
                    Login
                </a>

                <a href="#" class="bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-xl text-center">
                    Sign Up
                </a>
            </div>
        </div>
    </div>

    <section class="bg-[#0b0120] pt-32 pb-16 overflow-hidden">


        <div class="swiper mySwiper px-4">
            <div class="swiper-wrapper">

                <div class="swiper-slide !flex justify-center">
                    <div
                        class="relative w-[900px] h-[360px] max-md:w-[92%] max-md:h-[220px] rounded-2xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.45)] transition-all duration-300">
                        <img src="./image/slider.jpg" class="w-full h-full object-cover" />


                        <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/30 to-transparent"></div>



                    </div>
                </div>


                <div class="swiper-slide !flex justify-center">
                    <div
                        class="relative w-[900px] h-[360px] max-md:w-[92%] max-md:h-[220px] rounded-2xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.45)] transition-all duration-300">
                        <img src="./image/slider-2.png" class="w-full h-full object-cover" />

                        <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/30 to-transparent"></div>


                    </div>
                </div>


                <div class="swiper-slide !flex justify-center">
                    <div
                        class="relative w-[900px] h-[360px] max-md:w-[92%] max-md:h-[220px] rounded-2xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.45)] transition-all duration-300">
                        <img src="./image/slider-3.jpg" class="w-full h-full object-cover" />

                        <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/30 to-transparent"></div>


                    </div>
                </div>
            </div>


            <div class="swiper-pagination mt-6"></div>
        </div>
    </section>
    
    <div id="searchBox" class="hidden fixed top-16 left-0 w-full px-4 z-40">
        <div class="max-w-7xl mx-auto bg-[#151528] border border-gray-800 rounded-xl p-3 flex items-center shadow-lg">
            <i class="ri-search-line text-gray-400 mr-2"></i>
            <input type="text" placeholder="Search game..."
                class="w-full bg-transparent outline-none text-sm placeholder-gray-400" />
        </div>
    </div>

    <section class="max-w-7xl mx-auto px-4 pb-12">
        <div class="grid grid-cols-2 md:grid-cols-6 gap-6">
            <div class="rounded-2xl overflow-hidden border border-gray-800 bg-[#151528] hover:scale-105 transition">
                <div class="h-72 relative">

                    <img src="./image/mlbb.png" class="w-full h-full object-cover" />

                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                </div>

                <div class="p-4">
                    <h3
                        class="text-center font-semibold text-sm bg-gradient-to-r from-neoYellow to-neoPurple bg-clip-text text-transparent">
                        Mobile Legends
                    </h3>
                </div>
            </div>

            <div class="rounded-2xl overflow-hidden border border-gray-800 bg-[#151528] hover:scale-105 transition">
                <div class="h-72 relative">
                    <img src="./image/pubg.jpg" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                </div>

                <div class="p-4">
                    <h3
                        class="text-center font-semibold text-sm bg-gradient-to-r from-neoPurple to-neoYellow bg-clip-text text-transparent">
                        PUBG Mobile
                    </h3>
                </div>
            </div>

            <div class="rounded-2xl overflow-hidden border border-gray-800 bg-[#151528] hover:scale-105 transition">
                <div class="h-72 relative">
                    <img src="./image/mv.avif" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                </div>

                <div class="p-4">
                    <h3
                        class="text-center font-semibold text-sm bg-gradient-to-r from-neoYellow to-neoPurple bg-clip-text text-transparent">
                        Free Fire
                    </h3>
                </div>
            </div>

            <div class="rounded-2xl overflow-hidden border border-gray-800 bg-[#151528] hover:scale-105 transition">
                <div class="h-72 relative">
                    <img src="./image/guneshin.jpg" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                </div>

                <div class="p-4">
                    <h3
                        class="text-center font-semibold text-sm bg-gradient-to-r from-neoPurple to-neoYellow bg-clip-text text-transparent">
                        Genshin Impact
                    </h3>
                </div>
            </div>
            <div class="rounded-2xl overflow-hidden border border-gray-800 bg-[#151528] hover:scale-105 transition">
                <div class="h-72 relative">
                    <img src="./image/kung.jpg" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                </div>

                <div class="p-4">
                    <h3
                        class="text-center font-semibold text-sm bg-gradient-to-r from-neoPurple to-neoYellow bg-clip-text text-transparent">
                        Kung Fu Panda
                    </h3>
                </div>
            </div>
            <div class="rounded-2xl overflow-hidden border border-gray-800 bg-[#151528] hover:scale-105 transition">
                <div class="h-72 relative">
                    <img src="./image/where.avif" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent"></div>
                </div>

                <div class="p-4">
                    <h3
                        class="text-center font-semibold text-sm bg-gradient-to-r from-neoPurple to-neoYellow bg-clip-text text-transparent">
                        wuthering waves
                    </h3>
                </div>
            </div>
        </div>
    </section>

    <footer class="border-t border-gray-800 py-6 text-center text-gray-400 text-sm">
        © 2026 GameShop
    </footer>

    <script src="js/swiper.min.js"></script>
    <script src="js/script.js"></script>

</body>

</html>
